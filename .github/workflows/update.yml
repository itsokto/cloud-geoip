name: Update IP lists

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install bgpq4
        run: sudo apt-get update && sudo apt-get install -y bgpq4

      - name: Generate
        run: go run .

      - name: Check for changes
        id: diff
        run: |
          cd output

          # clone release branch for comparison
          git clone --depth 1 --branch release \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            ../release-old 2>/dev/null || true

          # compare all generated files against release branch
          if diff -qr . ../release-old --exclude='.git' &>/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to release branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git add .
          git commit -m "Update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin release

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(date -u +%Y-%m-%d)"
          gh release delete "$tag" --yes 2>/dev/null || true
          gh release create "$tag" \
            --title "$tag" \
            --notes "Files available on the [\`release\`](https://github.com/${{ github.repository }}/tree/release) branch."